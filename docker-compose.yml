services:
  postgres:
    image: postgres:16-alpine
    container_name: luka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: luka
      POSTGRES_PASSWORD: luka_dev_2024
      POSTGRES_DB: luka_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luka -d luka_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: luka-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
