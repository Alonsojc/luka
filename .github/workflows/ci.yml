name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/luka

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luka
          POSTGRES_PASSWORD: luka_test
          POSTGRES_DB: luka_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database run generate

      - name: Lint
        run: pnpm exec eslint apps/ packages/

      - name: Check formatting
        run: pnpm exec prettier --check "apps/**/*.{ts,tsx}" "packages/**/*.ts"

      - name: Run migrations
        run: pnpm --filter @luka/database run migrate:deploy
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public

      - name: Run API tests
        run: pnpm --filter @luka/api test
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public
          JWT_SECRET: test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Type check frontend
        run: pnpm --filter @luka/web exec tsc --noEmit

      - name: Security audit
        run: pnpm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luka
          POSTGRES_PASSWORD: luka_test
          POSTGRES_DB: luka_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database run generate

      - name: Run migrations
        run: pnpm --filter @luka/database run migrate:deploy
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public

      - name: Install Playwright browsers
        run: pnpm --filter @luka/web exec playwright install --with-deps chromium

      - name: Build API
        run: pnpm --filter @luka/api build

      - name: Build Web
        run: pnpm --filter @luka/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

      - name: Start services and wait
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public
          JWT_SECRET: test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          API_PORT: 3001
          NODE_ENV: test
        run: |
          # Start API in background (cd for pnpm node_modules resolution)
          cd apps/api
          nohup node dist/src/main.js > /tmp/api.log 2>&1 &
          echo "API PID: $!"
          cd ../..

          # Start Web in background
          cd apps/web
          nohup npx next start -p 3002 > /tmp/web.log 2>&1 &
          echo "Web PID: $!"
          cd ../..

          # Wait for API
          echo "Waiting for API on :3001..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "API is up after ${i}s!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "API failed to start. Logs:"
              tail -50 /tmp/api.log
              exit 1
            fi
            sleep 2
          done

          # Wait for Web
          echo "Waiting for Web on :3002..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3002 > /dev/null 2>&1; then
              echo "Web is up after ${i}s!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Web failed to start. Logs:"
              tail -50 /tmp/web.log
              exit 1
            fi
            sleep 2
          done

      - name: Seed test data
        run: pnpm db:seed && pnpm --filter @luka/database seed:demo
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public

      - name: Run Playwright E2E tests
        run: pnpm --filter @luka/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3002

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database run generate

      - name: Build API
        run: pnpm --filter @luka/api build

      - name: Build Web
        run: pnpm --filter @luka/web build
        env:
          NEXT_PUBLIC_API_URL: /api

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/luka" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
