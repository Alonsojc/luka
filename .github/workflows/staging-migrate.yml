name: Staging Database Migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type MIGRATE_STAGING to run Prisma migrations against staging."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: staging-database-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Run staging Prisma migrations
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

    steps:
      - name: Validate confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "MIGRATE_STAGING" ]; then
            echo "::error::Confirmation must be exactly MIGRATE_STAGING."
            exit 1
          fi

      - name: Validate staging database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing STAGING_DATABASE_URL secret in the staging environment."
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database run generate

      - name: Report migration status before deploy
        continue-on-error: true
        run: pnpm --filter @luka/database exec prisma migrate status --schema=./prisma/schema.prisma

      - name: Deploy staging migrations
        run: pnpm --filter @luka/database run migrate:deploy

      - name: Check migration status after deploy
        run: pnpm --filter @luka/database exec prisma migrate status --schema=./prisma/schema.prisma
