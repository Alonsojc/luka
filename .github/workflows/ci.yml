name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/luka
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.prefix.outputs.image_prefix }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack install

      - name: Validate pnpm availability
        run: corepack pnpm --version

      - name: Compute and validate lowercase image prefix
        id: prefix
        run: |
          IMAGE_PREFIX="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/luka"
          if [[ "${IMAGE_PREFIX}" != "${IMAGE_PREFIX,,}" ]]; then
            echo "Image prefix is not lowercase: ${IMAGE_PREFIX}"
            exit 1
          fi
          echo "image_prefix=${IMAGE_PREFIX}" >> "$GITHUB_OUTPUT"

  test:
    needs: preflight
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luka
          POSTGRES_PASSWORD: luka_test
          POSTGRES_DB: luka_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack install

      - run: corepack pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database run generate

      - name: Lint
        run: pnpm exec eslint apps/ packages/

      - name: Check formatting
        run: pnpm exec prettier --check "apps/**/*.{ts,tsx}" "packages/**/*.ts" || true

      - name: Run migrations
        run: pnpm --filter @luka/database run migrate:deploy
        run: corepack pnpm --filter @luka/database generate

      - name: Run migrations
        run: corepack pnpm --filter @luka/database migrate:deploy
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public

      - name: Run API tests
        run: corepack pnpm --filter @luka/api test
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public
          JWT_SECRET: test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Type check frontend
        run: corepack pnpm --filter @luka/web exec tsc --noEmit

      - name: Security audit
        run: pnpm audit --audit-level=critical 2>/dev/null || true

  e2e:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true  # E2E is informational — don't block PRs

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luka
          POSTGRES_PASSWORD: luka_test
          POSTGRES_DB: luka_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database run generate

      - name: Run migrations
        run: pnpm --filter @luka/database run migrate:deploy
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public

      - name: Install Playwright browsers
        run: pnpm --filter @luka/web exec playwright install --with-deps chromium

      - name: Build API
        run: pnpm --filter @luka/api build

      - name: Build Web
        run: pnpm --filter @luka/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

      - name: Start services and wait
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public
          JWT_SECRET: test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          API_PORT: 3001
          NODE_ENV: test
        run: |
          # Start API in background
          cd apps/api
          nohup node dist/main.js > /tmp/api.log 2>&1 &
          echo "API PID: $!"
          cd ../..

          # Start Web in background
          cd apps/web
          nohup npx next start -p 3000 > /tmp/web.log 2>&1 &
          echo "Web PID: $!"
          cd ../..

          # Wait for API
          echo "Waiting for API on :3001..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "API is up after ${i}s!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "API failed to start. Logs:"
              tail -50 /tmp/api.log
              exit 1
            fi
            sleep 2
          done

          # Wait for Web
          echo "Waiting for Web on :3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Web is up after ${i}s!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Web failed to start. Logs:"
              tail -50 /tmp/web.log
              exit 1
            fi
            sleep 2
          done

      - name: Seed test data
        run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public

      - name: Run Playwright E2E tests
        run: pnpm --filter @luka/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/test-results/
          retention-days: 7
        run: corepack pnpm audit --prod --audit-level=high || true

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack install

      - run: corepack pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database run generate
        run: corepack pnpm --filter @luka/database generate

      - name: Build API
        run: corepack pnpm --filter @luka/api build

      - name: Build Web
        run: corepack pnpm --filter @luka/web build
        env:
          NEXT_PUBLIC_API_URL: /api

  docker:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ needs.preflight.outputs.image_prefix }}-api:latest
            ${{ needs.preflight.outputs.image_prefix }}-api:${{ github.sha }}
          load: ${{ github.ref != 'refs/heads/main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ needs.preflight.outputs.image_prefix }}-web:latest
            ${{ needs.preflight.outputs.image_prefix }}-web:${{ github.sha }}
          load: ${{ github.ref != 'refs/heads/main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
