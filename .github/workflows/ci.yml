name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/luka

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luka
          POSTGRES_PASSWORD: luka_test
          POSTGRES_DB: luka_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database prisma generate

      - name: Lint
        run: pnpm exec eslint apps/ packages/

      - name: Check formatting
        run: pnpm exec prettier --check "apps/**/*.{ts,tsx}" "packages/**/*.ts" || true

      - name: Run migrations
        run: pnpm --filter @luka/database prisma migrate deploy
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public

      - name: Run API tests
        run: pnpm --filter @luka/api test
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public
          JWT_SECRET: test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Type check frontend
        run: pnpm --filter @luka/web exec tsc --noEmit

      - name: Security audit
        run: pnpm audit --audit-level=critical
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luka
          POSTGRES_PASSWORD: luka_test
          POSTGRES_DB: luka_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database prisma generate

      - name: Run migrations
        run: pnpm --filter @luka/database prisma migrate deploy
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public

      - name: Install Playwright browsers
        run: pnpm --filter @luka/web exec playwright install --with-deps chromium

      - name: Build and start API
        run: |
          pnpm --filter @luka/api build
          pnpm --filter @luka/api start &
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public
          JWT_SECRET: test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          API_PORT: 3001

      - name: Build and start Web
        run: |
          pnpm --filter @luka/web build
          pnpm --filter @luka/web start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

      - name: Wait for services
        run: |
          timeout 30 bash -c 'until curl -s http://localhost:3001/api/health > /dev/null; do sleep 1; done'
          timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 1; done'

      - name: Seed test data
        run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://luka:luka_test@localhost:5432/luka_test?schema=public

      - name: Run Playwright E2E tests
        run: pnpm --filter @luka/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/test-results/
          retention-days: 7

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @luka/database prisma generate

      - name: Build API
        run: pnpm --filter @luka/api build

      - name: Build Web
        run: pnpm --filter @luka/web build
        env:
          NEXT_PUBLIC_API_URL: /api

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
